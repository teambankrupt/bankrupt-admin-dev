<div id="layout-wrapper">


  <div class="page-content">
    <div class="container-fluid">

      <util-progress *ngIf="loading"></util-progress>
      <div *ngIf="!loading && polls?.content?.length===0">
        No Items found
      </div>
      <div class="row">
        <div class="col-12">
          <div class="card">
            <div class="card-body">

              <h4 class="card-title">Polls</h4>
              <p class="card-title-desc">Poll list
                <button (click)="openEditForm(null)">Add new</button>
              </p>

              <div class="table-responsive">
                <table class="table table-editable table-nowrap align-middle table-edits">
                  <thead>
                  <tr>
                    <th>Title</th>
                    <th>Valid From</th>
                    <th>Valid Till</th>
                    <th>Post Content</th>
                    <th>Post Type</th>
                  </tr>
                  </thead>
                  <tbody>
                  <tr *ngFor="let q of polls?.content" (click)="openEditForm(q.id)">
                    <td>{{q.title}}</td>
                    <td>{{q.active_from}}</td>
                    <td>{{q.active_until}}</td>
                    <td>{{q.post?.content}}</td>
                    <td>{{q.post?.type}}</td>

                    <td style="width: 100px">
                      <a class="btn btn-outline-secondary btn-sm edit" title="Edit">
                        <i class="fas fa-pencil-alt"></i>
                      </a>
                    </td>
                  </tr>

                  </tbody>
                </table>
              </div>

              <div class="col-lg-12 grid-margin stretch-card">
                <div class="card">
                  <mat-paginator [length]="polls?.totalElements"
                                 [pageSize]="this.size"
                                 (page)="onChange($event)"
                                 aria-label="Select page">
                  </mat-paginator>
                </div>
              </div>

            </div>
          </div>
        </div> <!-- end col -->
      </div>

    </div>
  </div>

</div>
