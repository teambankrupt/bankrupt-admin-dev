<div id="layout-wrapper">
  <div class="page-content">
    <div class="container-fluid">

      <form class="forms-sample" [formGroup]="pollForm">
        <div class="row">
          <div class="col-12">
            <div class="form-group">
              <label for="exampleInputName1">Title</label>
              <input type="text" class="form-control" id="exampleInputName1" placeholder="Title"
                     formControlName="title">
            </div>
          </div>
          <div class="col-12">
            <div class="form-group">
              <label class="label-text">Select Option</label>
              <ng-select
                [items]="options"
                [hideSelected]="true"
                (remove)="onRemove($event)"
                (add)="addOption($event)"
                [addTag]="true"
                [multiple]="true"
                bindLabel="name"
                [(ngModel)]="selectedOptions"
                [ngModelOptions]="{standalone: true}"
                placeholder="Option">
                <ng-template ng-option-tmp let-item="item" let-item$="item$" let-index="index">
                  <input id="item-{{index}}" type="checkbox" [ngModel]="item$.selected"/> {{item?.name}}
                </ng-template>
              </ng-select>

            </div>
          </div>

          <div class="col-12">
            <div>
              <label class="label-text">Add Correct options</label>
              <ng-select
                [items]="selectedOptions"
                [hideSelected]="true"
                [multiple]="true"
                bindLabel="name"
                bindValue="name"
                formControlName="correct_options"
                placeholder="Correct Option">
              </ng-select>

            </div>
          </div>
        </div>

        <div class="row">
          <div class="col-md-6">
            <label>Active From</label>
            <div class="input-group">
              <input class="form-control" bsDatepicker
                     [bsConfig]="{ dateInputFormat: 'DD-MM-YYYY, h:mm:ss a' }"
                     [minDate]="minStartDate"
                     [(ngModel)]="start_date" (ngModelChange)="selectStartDate()"
                     [ngModelOptions]="{standalone: true}" [maxDate]="maxStartDate">
            </div>
          </div>
          <div class="col-md-6">
            <div class="form-group">
              <label>Ends At</label>
              <div class="input-group">
                <input class="form-control" bsDatepicker
                       [bsConfig]="{ dateInputFormat: 'DD-MM-YYYY, h:mm:ss a' }"
                       [minDate]="minEndDate"
                       [(ngModel)]="end_date" (ngModelChange)="selectEndDate()"
                       [ngModelOptions]="{standalone: true}">
              </div>
            </div>
          </div>

          <div class="row">
            <div class="form-group">
              <label>Answer type</label>
              <div class="col-6 form-check">
                <input class="form-check-input" type="radio" name="multiple_choice" id="exampleRadios2"
                       [value]="false"
                       formControlName="multiple_choice">
                <label class="form-check-label" for="exampleRadios2">
                  Single
                </label>
              </div>
              <div class="col-6 form-check">
                <input class="form-check-input" type="radio" name="multiple_choice" id="exampleRadios3" [value]="true"
                       formControlName="multiple_choice">
                <label class="form-check-label" for="exampleRadios3">
                  Multiple
                </label>
              </div>
            </div>
          </div>
        </div>


        <div class="row">
          <div formGroupName="post">
            <h4 class="card-title">Post</h4>

            <div class="row">
              <div class="col-12">
                <div class="form-group">
                  <label for="present">Content<sup>*</sup></label>
                  <textarea id="present" class="form-control" formControlName="content"></textarea>
                </div>
              </div>
            </div>

            <section class="upload-img-area review-rdi pt-4 bdr-b pb-4">

              <h5 class="field-title">UPLOAD DOCUMENTS</h5>
              <small class="field-subtitle">Upload related documents.</small>

              <div class="post-last-step-gallery mt-2">
                <div>
                  <img class="m-1 imageClass" *ngFor="let uf of uploadFiles" [src]="uf.previewUrl"
                       (click)="removeImage(uf)" alt="">
                </div>
                <div *ngIf="uploadFiles.length<5">
                  <label for="image-upload"><i class="flaticon-add"></i></label>
                  <input type="file" id="image-upload" (change)="onImageSelected($event)">
                </div>
              </div>
              <div class="text-warning mt-1" *ngIf="isInvalidFileCount()">
                <small>Minimum 1 document is needed.</small>
              </div>
            </section>

          </div>


        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-gradient-success btn-icon-text" (click)="uploadImages()"
                  [disabled]="!pollForm.valid || uploadFiles.length===0 || loading || selectedOptions.length<2">
            <i class="mdi mdi-file-check btn-icon-prepend"></i>
            Submit
          </button>
        </div>
        <util-progress [bar]="true" *ngIf="loading"></util-progress>

      </form>

    </div>
  </div>
</div>
