<div id="layout-wrapper">
  <div class="page-content">
    <div class="container-fluid">

      <form class="forms-sample" [formGroup]="pollOptionForm">

        <div class="row">
          <h4 class="card-title">Poll Options</h4>

          <div class="row">
            <div class="col-6 pr-2">
              <div class="form-group">
                <label for="present">Name<sup>*</sup></label>
                <input type="text" class="form-control" id="present" formControlName="name">
              </div>
            </div>

          </div>

          <section class="upload-img-area review-rdi pt-4 bdr-b pb-4">

            <h5 class="field-title">UPLOAD DOCUMENTS</h5>
            <small class="field-subtitle">Upload related documents.</small>

            <div class="post-last-step-gallery mt-2">
              <div>
                <img class="m-1 imageClass" *ngFor="let uf of uploadFiles" [src]="uf.previewUrl"
                     (click)="removeImage(uf)" alt="">
              </div>
              <div *ngIf="uploadFiles.length<5">
                <label for="image-upload"><i class="flaticon-add"></i></label>
                <input type="file" id="image-upload" (change)="onImageSelected($event)">
              </div>
            </div>
            <div class="text-warning mt-1" *ngIf="isInvalidFileCount()">
              <small>Minimum 1 document is needed.</small>
            </div>
          </section>

        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-gradient-success btn-icon-text" (click)="uploadImages()"
                  [disabled]="!pollOptionForm.valid || uploadFiles.length===0 || loading">
            <i class="mdi mdi-file-check btn-icon-prepend"></i>
            Submit
          </button>
        </div>
        <util-progress [bar]="true" *ngIf="loading"></util-progress>

      </form>
    </div>
  </div>
</div>
