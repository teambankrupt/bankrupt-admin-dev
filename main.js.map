<!--Hero service area start-->
<section class="login-page-hero-section">
  <div class="container">
    <img class="login-graphics" src="assets/img/login-page-images/login-hero-page.png" alt="astha login page">
  </div>
</section>
<!--Hero service area end-->

<section class="login-form-section pb-5 px-3">
  <div class="container">
    <div class="row d-flex justify-content-center text-center">
      <div class="col-12">
        <div class="section-title">
          <h1>login</h1>
        </div>
      </div>
      <div class="col-sm-12 col-md-6 col-lg-4">
        <div class="astha-login-form-area">
          <form action="POST" [formGroup]="loginForm" (ngSubmit)="login()">
            <div class="input-group flex-nowrap">
              <span class="input-group-text">
                <i class="flaticon-user"></i>
              </span>
              <input type="text" class="form-control" placeholder="Username" formControlName="username">
            </div>

            <div class="input-group">
              <span class="input-group-text">
                <mat-icon>lock</mat-icon>
              </span>
              <input type="password" class="form-control" placeholder="Password" formControlName="password">
              <a class="input-group-text reset-pass text-warning" [routerLink]="['/reset-password']">Forgot?</a>
            </div>

            <div class="btn-action">
              <button type="submit" class="btn-login" [disabled]="!loginForm.valid">Login</button>
            </div>
          </form>
          <!--          <div class="text-center mt-4 font-weight-light">-->
          <!--            Don't have an account? <a [routerLink]="['/sign-up']" class="text-primary">Create</a>-->
          <!--          </div>-->
          <div class="signup-area mt-5">
            <h4 class="text-center">New to Astha App?</h4>
            <a class="btn-sign-up" [routerLink]="['/sign-up']">Sign Up</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<section class="copyright-area pb-5">
  <div class="container">
    <div class="row">
      <div class="col-12 text-center">
        <h5>&copy; SERVICITO LTD</h5>
      </div>
    </div>
  </div>
</section>
